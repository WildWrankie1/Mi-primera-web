<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera web</title>
    <style>

        body{
            font-family: sans-serif; 
            text-align: center;
        }

        h1 {
            color:#2c3e50;
            font-size: 40px;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding: 20px;
            margin-bottom: 50px;
        }

        p {
            color: #7f8c8d;
            font-style: italic;
        }

        #lista-skills {
            background-color: #dbdada;
            padding: 20px;
            list-style-type: "👽";
            width: 200px;
            border-radius: 10px;
            
            
        }

        .clase-estudios {
            background-color: green;
        }

        .clase-hobbies {
            background-color: orange;
            list-style-type: "👾";
        }

        .dark-mode {
            background-color: #2c3e50;
            color: white;
        }

        .contenedor-listas {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .dark-mode h1 {
            color: white;
        }

        .dark-mode p {
            color: #bdc3c7;
        }

        .dark-mode #lista-skills {
            background-color: #3b95ee;
            
        }

        @media (max-width: 600px) {
            .contenedor-listas {
                flex-direction: column;
                align-items: center;
                
        }
        }

        h1{
            font-size: 25px;
        }

        
    

    .link-red, button {
    display: inline-block;
    margin: 10px;
    padding: 8px 15px;
    background-color: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s; /* Animación suave */
}

.link-red:hover, button {
    background-color: #2980b9;
    transform: scale(1.2);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* Se hace un poquito más grande al pasar el mouse */
}


.contenedor-principal {
    display: grid;
    /* Queremos 3 columnas: una pequeña, una grande y otra pequeña */
    grid-template-columns: 1fr 2fr 1fr;
    gap: 20px;
    padding: 20px;
}

/* En el móvil, queremos que todo vuelva a ser una sola columna */
@media (max-width: 768px) {
    .contenedor-principal {
        grid-template-columns: 1fr;
    }
}

section {
    background-color: rgba(255, 255, 255, 0.1); /* Un fondo sutil */
    padding: 20px;
    border-radius: 15px;
    border: 1px solid #ddd;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Sombra para dar profundidad */
}

/* Para que se vea bien en el modo oscuro */
.dark-mode section {
    border-color: #444;
    background-color: rgba(0, 0, 0, 0.2);
}

body, section, h1, p, ul, button {
    transition: all 0.5s ease;
}

section:hover {
    transform:  translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    border-color: #3498db

}


    </style>



</head>
<body>


<div class="contenedor-principal">


<section>
    
    <button id="tu-boton-id">Cambiar color</button>

    <p id = "contador-visual">Has cambiado el modo de color 0 veces</p>
    <br>


<input type="text" id="input-nombre-nuevo" placeholder ="Escribe tu nuevo nombre">
<br>
<button id="boton-guardar-nombre"> Cambiar y Guardar nombre</button>
<br>

    <h1>Francisco Javier</h1><br>

</section>


    
    
<section>
    <p>Ingeniero de Software</p>

    <div class="contenedor-listas">
        <ul class="clase-estudios">
         <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>

        <ol class="clase-hobbies">
            <li>Trabajar</li>
            <li>Jugar</li>
            <li>Comer</li>
        </ol>
    </div>
    <a href="https://www.google.com">Ir a Google</a>

</section>
    




<section>

<div class="panel-control">
        <input type="text" id="input-habilidad" placeholder="Nueva habilidad...">
        <button id="boton-agregar">Añadir a la lista</button>
    </div>


    <h3>Mis Skills (Generadas con JS)</h3>
<ul id="lista-skills"></ul>


<div id="contenedor-redes">
<h3>Mis Redes Sociales (Generadas con JS)</h3>
<ul id="lista-redes"></ul>
    
</div>    
</section>


    <script>
        


<script>
    // 1. REFERENCIAS Y VARIABLES
    const tituloPrincipal = document.querySelector('h1');
    const contenedorUL = document.querySelector('#lista-skills');
    const inputHabilidad = document.querySelector('#input-habilidad');
    const inputNombreNuevo = document.querySelector('#input-nombre-nuevo');

    // 2. CARGAR NOMBRE DEL BAÚL
    const nombreGuardado = localStorage.getItem("h1");
    if (nombreGuardado) tituloPrincipal.innerText = nombreGuardado;

    // 3. CARGAR HABILIDADES DEL BAÚL
    // Si el baúl está vacío, usamos una lista por defecto
    let habilidades = JSON.parse(localStorage.getItem("misSkills")) || ["HTML", "CSS", "JS"];

    // 4. LA MÁQUINA DE CREAR Y GUARDAR
    function crearHabilidad(texto, guardar = false) {
        const nuevoItem = document.createElement('li');
        nuevoItem.innerText = texto;
        nuevoItem.style.cursor = "pointer";
        
        // Al hacer clic, se borra y se actualiza el baúl
        nuevoItem.addEventListener('click', () => {
            nuevoItem.remove();
            habilidades = habilidades.filter(h => h !== texto); // La quitamos de la lista
            localStorage.setItem("misSkills", JSON.stringify(habilidades)); // Guardamos
        });

        contenedorUL.appendChild(nuevoItem);

        if (guardar) {
            habilidades.push(texto); // La añadimos a nuestra lista
            localStorage.setItem("misSkills", JSON.stringify(habilidades)); // Guardamos en el baúl
        }
    }

    // Dibujamos las habilidades que ya teníamos guardadas
    habilidades.forEach(h => crearHabilidad(h));

    // 5. EVENTOS DE BOTONES
    // Botón Modo Oscuro
    document.querySelector('#tu-boton-id').addEventListener('click', (e) => {
        const esOscuro = document.body.classList.toggle('dark-mode');
        e.target.innerText = esOscuro ? "Modo Claro" : "Modo Oscuro";
    });

    // Botón Guardar Nombre
    document.querySelector('#boton-guardar-nombre').addEventListener('click', () => {
        const valor = inputNombreNuevo.value.trim();
        if (valor) {
            tituloPrincipal.innerText = valor;
            localStorage.setItem("h1", valor);
            inputNombreNuevo.value = "";
        }
    });

    // Botón Añadir Habilidad
    document.querySelector('#boton-agregar').addEventListener('click', () => {
        const valor = inputHabilidad.value.trim();
        if (valor) {
            crearHabilidad(valor, true); // True para que la guarde en el baúl
            inputHabilidad.value = "";
        }
    });

    // Redes Sociales
    const redesContenedor = document.querySelector('#contenedor-redes');
    ["LinkedIn", "GitHub", "Twitter"].forEach(red => {
        const a = document.createElement('a');
        a.innerText = red;
        a.href = "#";
        a.classList.add('link-red');
        redesContenedor.appendChild(a);
    });
</script>

</script>  
       
</body>
</html>
